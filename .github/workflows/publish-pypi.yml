# Publish to PyPI when a release is published. Uses Trusted Publishing (no API token).
# On PyPI: add this repo as a Trusted Publisher (owner, repo name, workflow: publish-pypi.yml).
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          V=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "Building version: $V"
          if [ -z "$V" ]; then echo "::error::Could not read version from pyproject.toml"; exit 1; fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
